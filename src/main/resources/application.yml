spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/San3a}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:12345}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:TXlTdXBlclNlY3JldEtleUZvclNhbjNhQmFja2VuZDIwMjZTdHJvbmdLZXk=}
    access-token-expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
